# Shared-bus topology: both agents subscribe to the same kite-server.
#
# Bootstrap sidecar seeds one team with two scoped API keys (one per agent)
# and one GitHub hook token; fake-drain posts to that team's hook, both
# agents receive via WebSocket.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: kite
      POSTGRES_USER: kite
      POSTGRES_PASSWORD: kite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kite -d kite"]
      interval: 3s
      timeout: 2s
      retries: 30
    networks: [mesh]

  kite-server:
    image: ${KITE_SERVER_IMAGE:-ghcr.io/alpha-centauri-cyberspace/kite-server-server:latest}
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://kite:kite@postgres:5432/kite
      KITE_PORT: 7700
      KITE_HOST: 0.0.0.0
      RUST_LOG: info,kite_server=debug
      KITE_HOOK_SECRET_CIPHER_KEY: ${KITE_HOOK_SECRET_CIPHER_KEY:-0123456789abcdef0123456789abcdef}
      # Bumped from 100/window default so the drain can fire at 5/sec
      # without hitting the per-team rate limit every few requests.
      KITE_TEAM_RATE_LIMIT: "100000"
      KITE_GLOBAL_RATE_LIMIT: "1000000"
    networks: [mesh]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"]
      interval: 3s
      timeout: 3s
      retries: 60
      # amd64-under-emulation on Apple Silicon is slow to migrate + boot.
      start_period: 180s

  bootstrap:
    build: ../images/bootstrap
    depends_on:
      # bootstrap polls for the 'teams' table itself, so it just needs the
      # DB to be up and the kite-server migrations to have landed. Waiting
      # on postgres (not kite-server) keeps the dep graph acyclic.
      postgres: { condition: service_healthy }
    environment:
      BOOTSTRAP_DATABASE_URL: postgres://kite:kite@postgres:5432/kite
      BOOTSTRAP_AGENT_TEAMS: "openclaw=shared paperclip=shared"
      BOOTSTRAP_OUT_DIR: /run/kite-env
    volumes:
      - kite-env:/run/kite-env
    networks: [mesh]
    restart: "no"

  drain:
    build: ../images/fake-drain
    depends_on:
      bootstrap: { condition: service_completed_successfully }
    environment:
      KITE_HOOK_URL: http://kite-server:7700
      KITE_TEAM_ID: shared
      DRAIN_SCHEDULE: ${DRAIN_SCHEDULE:-5/sec}
      DRAIN_SOURCE: github
      DRAIN_ENV_FILE: /run/kite-env/teams.env
      DRAIN_ENV_VAR: TEAM_SHARED_HOOK_TOKEN
    volumes:
      - kite-env:/run/kite-env:ro
    networks: [mesh]

  agent-openclaw:
    build: ../images/agent-openclaw
    depends_on:
      bootstrap: { condition: service_completed_successfully }
    volumes:
      - kite-env:/run/kite-env:ro
      - ../scenarios:/scenarios:ro
    environment:
      AGENT_NAME: openclaw
      AGENT_ENV_FILE: /run/kite-env/openclaw.env
      KITE_WS_URL: ws://kite-server:7700/ws
      KITE_HTTP_URL: http://kite-server:7700
      AGENT_MODE: ${AGENT_MODE:-scripted}
      SCENARIO: ${SCENARIO:-ping-pong}
      # Hosted agent-to-agent peering. MY_AGENT_ID lands via the bootstrap
      # env file as well, but we set it here so PEER_AGENT_ID's value is
      # readable next to it. PEER is the agent on the same team this one
      # messages in the a2a-ping-pong scenario.
      PEER_AGENT_ID: agent-paperclip
      # Model-mode inputs (ignored when AGENT_MODE=scripted).
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-anthropic/claude-haiku-4-5}
      MAX_COST_USD: ${MAX_COST_USD:-0}
    networks: [mesh]

  agent-paperclip:
    build: ../images/agent-paperclip
    depends_on:
      bootstrap: { condition: service_completed_successfully }
    volumes:
      - kite-env:/run/kite-env:ro
      - ../scenarios:/scenarios:ro
    environment:
      AGENT_NAME: paperclip
      AGENT_ENV_FILE: /run/kite-env/paperclip.env
      KITE_WS_URL: ws://kite-server:7700/ws
      KITE_HTTP_URL: http://kite-server:7700
      AGENT_MODE: ${AGENT_MODE:-scripted}
      SCENARIO: ${SCENARIO:-ping-pong}
      PEER_AGENT_ID: agent-openclaw
      # Model-mode inputs (ignored when AGENT_MODE=scripted).
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-anthropic/claude-haiku-4-5}
      MAX_COST_USD: ${MAX_COST_USD:-0}
    networks: [mesh]

  judge:
    build: ../judge
    depends_on:
      - agent-openclaw
      - agent-paperclip
      - drain
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OUT_DIR:-/tmp/kite-results}:/out
    environment:
      SCENARIO: ${SCENARIO:-ping-pong}
      JUDGE_DURATION_SEC: ${JUDGE_DURATION_SEC:-45}
      JUDGE_TOPOLOGY: shared-bus
    networks: [mesh]

volumes:
  kite-env:

networks:
  mesh:
    driver: bridge
