# Federated topology: two independent kite-servers bridged via
# `kite stream --federation-target`.
#   drain → kite-server-a  →  openclaw (subs to A, federates to B)  →  kite-server-b  →  paperclip (subs to B)

services:
  postgres-a:
    image: postgres:17
    environment: { POSTGRES_DB: kite, POSTGRES_USER: kite, POSTGRES_PASSWORD: kite }
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U kite -d kite"], interval: 3s, retries: 30 }
    networks: [mesh]

  postgres-b:
    image: postgres:17
    environment: { POSTGRES_DB: kite, POSTGRES_USER: kite, POSTGRES_PASSWORD: kite }
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U kite -d kite"], interval: 3s, retries: 30 }
    networks: [mesh]

  kite-server-a:
    image: ${KITE_SERVER_IMAGE:-ghcr.io/alpha-centauri-cyberspace/kite-server-server:latest}
    platform: ${KITE_SERVER_PLATFORM:-linux/amd64}
    depends_on: { postgres-a: { condition: service_healthy } }
    environment:
      DATABASE_URL: postgres://kite:kite@postgres-a:5432/kite
      KITE_PORT: 7700
      KITE_HOST: 0.0.0.0
      KITE_INSTANCE_ID: server-a
      KITE_HOOK_SECRET_CIPHER_KEY: ${KITE_HOOK_SECRET_CIPHER_KEY:-0123456789abcdef0123456789abcdef}
      KITE_TEAM_RATE_LIMIT: "100000"
      KITE_GLOBAL_RATE_LIMIT: "1000000"
      RUST_LOG: info,kite_server=debug
    networks: [mesh]
    healthcheck: { test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"], interval: 3s, retries: 40, start_period: 120s }

  kite-server-b:
    image: ${KITE_SERVER_IMAGE:-ghcr.io/alpha-centauri-cyberspace/kite-server-server:latest}
    platform: ${KITE_SERVER_PLATFORM:-linux/amd64}
    depends_on: { postgres-b: { condition: service_healthy } }
    environment:
      DATABASE_URL: postgres://kite:kite@postgres-b:5432/kite
      KITE_PORT: 7700
      KITE_HOST: 0.0.0.0
      KITE_INSTANCE_ID: server-b
      KITE_HOOK_SECRET_CIPHER_KEY: ${KITE_HOOK_SECRET_CIPHER_KEY:-0123456789abcdef0123456789abcdef}
      KITE_TEAM_RATE_LIMIT: "100000"
      KITE_GLOBAL_RATE_LIMIT: "1000000"
      RUST_LOG: info,kite_server=debug
    networks: [mesh]
    healthcheck: { test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"], interval: 3s, retries: 40, start_period: 120s }

  bootstrap-a:
    build: ../images/bootstrap
    depends_on:
      postgres-a: { condition: service_healthy }
    environment:
      BOOTSTRAP_DATABASE_URL: postgres://kite:kite@postgres-a:5432/kite
      BOOTSTRAP_AGENT_TEAMS: "openclaw=team-a"
      BOOTSTRAP_OUT_DIR: /run/kite-env
    volumes: [kite-env:/run/kite-env]
    networks: [mesh]
    restart: "no"

  bootstrap-b:
    build: ../images/bootstrap
    depends_on:
      postgres-b: { condition: service_healthy }
    environment:
      BOOTSTRAP_DATABASE_URL: postgres://kite:kite@postgres-b:5432/kite
      BOOTSTRAP_AGENT_TEAMS: "paperclip=team-b"
      BOOTSTRAP_OUT_DIR: /run/kite-env
    volumes: [kite-env:/run/kite-env]
    networks: [mesh]
    restart: "no"

  drain:
    build: ../images/fake-drain
    depends_on:
      bootstrap-a: { condition: service_completed_successfully }
    environment:
      KITE_HOOK_URL: http://kite-server-a:7700
      KITE_TEAM_ID: team-a
      DRAIN_SCHEDULE: ${DRAIN_SCHEDULE:-5/sec}
      DRAIN_SOURCE: github
      DRAIN_ENV_FILE: /run/kite-env/teams.env
      DRAIN_ENV_VAR: TEAM_TEAM_A_HOOK_TOKEN
    volumes: [kite-env:/run/kite-env:ro]
    networks: [mesh]

  agent-openclaw:
    build: ../images/agent-openclaw
    depends_on:
      bootstrap-a: { condition: service_completed_successfully }
    volumes:
      - kite-env:/run/kite-env:ro
      - ../scenarios:/scenarios:ro
    environment:
      AGENT_NAME: openclaw
      AGENT_ENV_FILE: /run/kite-env/openclaw.env
      KITE_WS_URL: ws://kite-server-a:7700/ws
      KITE_HTTP_URL: http://kite-server-a:7700
      FEDERATION_TARGET_URL: ws://kite-server-b:7700/ws
      AGENT_MODE: ${AGENT_MODE:-scripted}
      SCENARIO: ${SCENARIO:-federation-roundtrip}
    networks: [mesh]

  agent-paperclip:
    build: ../images/agent-paperclip
    depends_on:
      bootstrap-b: { condition: service_completed_successfully }
    volumes:
      - kite-env:/run/kite-env:ro
      - ../scenarios:/scenarios:ro
    environment:
      AGENT_NAME: paperclip
      AGENT_ENV_FILE: /run/kite-env/paperclip.env
      KITE_WS_URL: ws://kite-server-b:7700/ws
      KITE_HTTP_URL: http://kite-server-b:7700
      AGENT_MODE: ${AGENT_MODE:-scripted}
      SCENARIO: ${SCENARIO:-federation-roundtrip}
    networks: [mesh]

  judge:
    build: ../judge
    depends_on:
      - agent-openclaw
      - agent-paperclip
      - drain
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OUT_DIR:-/tmp/kite-results}:/out
    environment:
      SCENARIO: ${SCENARIO:-federation-roundtrip}
      JUDGE_DURATION_SEC: ${JUDGE_DURATION_SEC:-60}
      JUDGE_TOPOLOGY: federated
    networks: [mesh]

volumes: { kite-env: {} }
networks: { mesh: { driver: bridge } }
