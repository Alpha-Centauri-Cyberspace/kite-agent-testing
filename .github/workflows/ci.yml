name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          docker compose -f compose/shared-bus.yml config >/dev/null
          docker compose -f compose/federated.yml config >/dev/null

  lint-dockerfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          # DL3008: apt version pinning (intentional; fresh-install on every build)
          # DL3018: apk version pinning (ditto)
          # DL3059: consecutive RUN instructions
          ignore: DL3008,DL3018,DL3059

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # SC1090 fires on every dynamic `source` (intentional — bootstrap
          # writes these files). SC2034 flags MODELS which is reserved for a
          # future flag sweep.
          shellcheck -e SC1090,SC2034 run.sh images/agent-openclaw/entrypoint.sh images/agent-paperclip/entrypoint.sh images/bootstrap/bootstrap.sh

  harness-shared-bus:
    name: E2E — shared-bus / ping-pong
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    # The kite-server GHCR image is private. The default GITHUB_TOKEN does
    # NOT get packages:read on another repo's packages — you must link the
    # `kite-server-server` package to this repo via GitHub UI
    # (https://github.com/orgs/Alpha-Centauri-Cyberspace/packages →
    #  kite-server-server → Package settings → Manage Actions access →
    #  add Alpha-Centauri-Cyberspace/kite-agent-testing, role: Read).
    # Once linked, the job below will succeed. Until then it runs as a
    # non-blocking advisory.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run harness
        env:
          # Runners are amd64 natively, so no emulation tax.
          KITE_SERVER_PLATFORM: linux/amd64
        run: ./run.sh --duration 45

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-shared-bus-results
          path: results/
          retention-days: 7
