name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          docker compose -f compose/shared-bus.yml config >/dev/null
          docker compose -f compose/federated.yml config >/dev/null

  lint-dockerfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3059

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck run.sh images/agent-openclaw/entrypoint.sh images/agent-paperclip/entrypoint.sh images/bootstrap/bootstrap.sh

  harness-shared-bus:
    name: E2E — shared-bus / ping-pong
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run harness
        env:
          # Runners are amd64 natively, so no emulation tax.
          KITE_SERVER_PLATFORM: linux/amd64
        run: ./run.sh --duration 45

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-shared-bus-results
          path: results/
          retention-days: 7
